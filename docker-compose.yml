# Coolify-ready deployment.
# In Coolify: create a Docker Compose resource from this repo, set the env vars
# below as secrets in the UI, and deploy. The service runs as a long-lived
# watcher that polls GitHub issues every POLL_INTERVAL_SECONDS.
services:
  agency:
    build: .
    restart: unless-stopped
    # Let in-flight agent runs finish on deploy/restart before the platform force-kills the
    # container (pairs with the app's graceful drain). Raise if your builds run longer.
    stop_grace_period: 600s
    environment:
      # ── Bootstrap / infra ────────────────────────────────────────────────
      RUN_MODE: ${RUN_MODE:-watch}            # watch (poll) | webhook | once
      PORT: 3000
      DB_PATH: /app/data/agency.db            # SQLite, on the mounted volume
      APP_ENV: ${APP_ENV:-production}         # set "development" on staging → DEV badge
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET:-}   # only for webhook mode
      GRACEFUL_SHUTDOWN_MS: ${GRACEFUL_SHUTDOWN_MS:-}

      # ── Auth ─────────────────────────────────────────────────────────────
      # MASTER_KEY (openssl rand -hex 32) enables MULTI-USER mode + encrypts all
      # stored secrets. Unset = legacy single-user Basic Auth via DASHBOARD_PASSWORD.
      MASTER_KEY: ${MASTER_KEY:-}
      DASHBOARD_PASSWORD: ${DASHBOARD_PASSWORD:-}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}   # seeds the first admin (multi-user)
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}        # falls back to DASHBOARD_PASSWORD
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}

      # ── Execution identity (global for now; becomes per-user, see roadmap) ─
      GITHUB_OWNER: ${GITHUB_OWNER}
      GITHUB_TOKEN: ${GITHUB_TOKEN}                # bot account token (commits/PRs as the bot)
      ADMIN_GITHUB_TOKEN: ${ADMIN_GITHUB_TOKEN:-}  # owner token (auto-invite the bot) — optional
      TARGET_REPOS: ${TARGET_REPOS:-}              # comma-separated, or use config/repos.txt
      # Agent brains — set ONE:
      CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN:-}   # subscription (claude setup-token)
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}              # or pay-as-you-go API key

      # ── Everything else lives in the dashboard ───────────────────────────
      # Trigger mode, handles, labels, concurrency, poll interval, cost/turn/token
      # guardrails, GitNexus, self-improve, follow-up window, preview, models, session
      # budget, etc. are all managed in Settings → Operations (stored in the DB).
    volumes:
      - agency-data:/app/data

volumes:
  agency-data:
