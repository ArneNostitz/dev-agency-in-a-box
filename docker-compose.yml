# Coolify-ready deployment.
# In Coolify: create a Docker Compose resource from this repo, set the env vars
# below as secrets in the UI, and deploy. The service runs as a long-lived
# watcher that polls GitHub issues every POLL_INTERVAL_SECONDS.
services:
  agency:
    build: .
    restart: unless-stopped
    # Let in-flight agent runs finish on deploy/restart before the platform force-kills the
    # container (pairs with the app's graceful drain). Raise if your builds run longer.
    stop_grace_period: 600s
    environment:
      # Trigger style: "watch" polls; "webhook" reacts instantly (set up a GitHub webhook).
      RUN_MODE: ${RUN_MODE:-watch}
      POLL_INTERVAL_SECONDS: ${POLL_INTERVAL_SECONDS:-60}
      # How many issues/PRs to work on in parallel.
      AGENCY_CONCURRENCY: ${AGENCY_CONCURRENCY:-3}
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET:-}
      # Public URL of this service (Coolify domain). Set it + the secret and webhook mode
      # auto-registers the GitHub webhooks for you.
      PUBLIC_URL: ${PUBLIC_URL:-}
      # Password for the status dashboard (Basic Auth). Unset = open.
      DASHBOARD_PASSWORD: ${DASHBOARD_PASSWORD:-}
      PORT: 3000

      # --- GitHub (required) ---
      # GITHUB_TOKEN = the BOT account's token (so comments/PRs are attributed to the bot).
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      # ADMIN_GITHUB_TOKEN = your OWNER token; used only to auto-invite the bot as a
      # collaborator on watched repos (the bot can't invite itself). Optional.
      ADMIN_GITHUB_TOKEN: ${ADMIN_GITHUB_TOKEN:-}
      GITHUB_OWNER: ${GITHUB_OWNER}
      # Repos come from config/repos.txt; or override with a comma-separated list:
      TARGET_REPOS: ${TARGET_REPOS:-}
      TARGET_REPO: ${TARGET_REPO:-}

      # Trigger: mention (default, e.g. "@dev ...") | label | any
      TRIGGER_MODE: ${TRIGGER_MODE:-mention}
      HANDLES: ${HANDLES:-}
      QUEUE_LABEL: ${QUEUE_LABEL:-agency:queue}
      IGNORE_LABEL: ${IGNORE_LABEL:-agency:ignore}

      # --- Agent brains: set ONE of these ---
      # Subscription token from `claude setup-token`:
      CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN:-}
      # ...or a pay-as-you-go API key:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}

      # Per-role model overrides (defaults: planner=opus 4.8, dev/arch/review=sonnet, tester=haiku)
      PLANNER_MODEL: ${PLANNER_MODEL:-}
      AGENT_MODEL: ${AGENT_MODEL:-}

      # Cost guardrails (per issue / per run; 0 disables)
      MAX_ISSUE_COST_USD: ${MAX_ISSUE_COST_USD:-}
      MAX_ISSUE_TURNS: ${MAX_ISSUE_TURNS:-}
      MAX_TURNS_PER_RUN: ${MAX_TURNS_PER_RUN:-}
      MAX_TOKENS_PER_RUN: ${MAX_TOKENS_PER_RUN:-}
      # Self-evolving loop (librarian lessons -> playbook PRs against AGENCY_REPO)
      SELF_IMPROVE: ${SELF_IMPROVE:-}
      LESSONS_PR_THRESHOLD: ${LESSONS_PR_THRESHOLD:-}
      AGENCY_REPO: ${AGENCY_REPO:-}
      # Re-engagement window + dashboard "Open preview" link template
      FOLLOWUP_WINDOW_DAYS: ${FOLLOWUP_WINDOW_DAYS:-}
      PREVIEW_URL_TEMPLATE: ${PREVIEW_URL_TEMPLATE:-}
      # Append [skip ci] to agency commits to save GitHub Actions minutes (set false to disable)
      SKIP_CI: ${SKIP_CI:-}
      # Auto-stop a dashboard "Run preview" dev server after this many idle minutes
      PREVIEW_TTL_MIN: ${PREVIEW_TTL_MIN:-}
      # Session token gauge + graceful deploys
      SESSION_WINDOW_HOURS: ${SESSION_WINDOW_HOURS:-}
      SESSION_TOKEN_BUDGET: ${SESSION_TOKEN_BUDGET:-}
      GRACEFUL_SHUTDOWN_MS: ${GRACEFUL_SHUTDOWN_MS:-}
      # SQLite memory lives on the mounted volume so it survives redeploys.
      DB_PATH: /app/data/agency.db
    volumes:
      - agency-data:/app/data

volumes:
  agency-data:
