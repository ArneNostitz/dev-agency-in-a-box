# Coolify-ready deployment.
# In Coolify: create a Docker Compose resource from this repo, set the env vars
# below as secrets in the UI, and deploy. The service runs as a long-lived
# watcher that polls GitHub issues every POLL_INTERVAL_SECONDS.
services:
  agency:
    build: .
    restart: unless-stopped
    environment:
      # Trigger style: "watch" polls; "webhook" reacts instantly (set up a GitHub webhook).
      RUN_MODE: ${RUN_MODE:-watch}
      POLL_INTERVAL_SECONDS: ${POLL_INTERVAL_SECONDS:-60}
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET:-}
      PORT: 3000

      # --- GitHub (required) ---
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      GITHUB_OWNER: ${GITHUB_OWNER}
      # Repos come from config/repos.txt; or override with a comma-separated list:
      TARGET_REPOS: ${TARGET_REPOS:-}
      TARGET_REPO: ${TARGET_REPO:-}

      # Trigger: mention (default, e.g. "@dev ...") | label | any
      TRIGGER_MODE: ${TRIGGER_MODE:-mention}
      HANDLES: ${HANDLES:-}
      QUEUE_LABEL: ${QUEUE_LABEL:-agency:queue}
      IGNORE_LABEL: ${IGNORE_LABEL:-agency:ignore}

      # --- Agent brains: set ONE of these ---
      # Subscription token from `claude setup-token`:
      CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN:-}
      # ...or a pay-as-you-go API key:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}

      # Per-role model overrides (defaults: planner=opus 4.8, dev/arch/review=sonnet, tester=haiku)
      PLANNER_MODEL: ${PLANNER_MODEL:-}
      AGENT_MODEL: ${AGENT_MODEL:-}
      # SQLite memory lives on the mounted volume so it survives redeploys.
      DB_PATH: /app/data/agency.db
    volumes:
      - agency-data:/app/data

volumes:
  agency-data:
