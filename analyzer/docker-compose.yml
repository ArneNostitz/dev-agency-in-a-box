# Coolify-ready Docker Compose for the standalone Process Analyzer (watchdog).
#
# Its OWN deploy, independent of the agency. No shared volume — it talks to the agency over HTTPS
# (authenticated, read-only). Minimal config: it gets the repo + thresholds from the agency, and the
# agency opens the advisory issue on its behalf. So you only set the agency URL, the shared key, and
# one LLM credential.
services:
  analyzer:
    build: .
    restart: unless-stopped
    environment:
      AGENCY_URL: ${AGENCY_URL:-}             # e.g. https://devagency.example.com
      AGENCY_API_KEY: ${AGENCY_API_KEY:-}     # == the agency's ANALYZER_API_KEY (openssl rand -hex 32)
      # One LLM credential (subscription token, API key, or provider base URL + token for GLM/etc.):
      CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-}
      ANTHROPIC_AUTH_TOKEN: ${ANTHROPIC_AUTH_TOKEN:-}
      ANALYZER_MODEL: ${ANALYZER_MODEL:-claude-sonnet-4-6}   # optional
    # No volumes — telemetry over HTTP, cursor in-memory.
